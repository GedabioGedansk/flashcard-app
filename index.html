<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flashcards</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f5f5;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
    }

    .card {
      margin: 40px auto;
      padding: 40px;
      width: 85%;
      max-width: 420px;
      background: white;
      border-radius: 20px;
      font-size: 28px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      cursor: pointer;
      min-height: 130px;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    .buttons {
      margin-top: 15px;
    }

    button {
      padding: 14px 18px;
      margin: 6px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    .know     { background: #4CAF50; color: white; }
    .dontknow { background: #f44336; color: white; }
    .switch   { background: #2196F3; color: white; }

    .progress {
      margin-top: 10px;
      color: #555;
      font-size: 14px;
    }
  </style>
</head>

<body>

<h1>Flashcards</h1>

<div class="card" onclick="flipCard()">Lädt...</div>

<div class="buttons">
  <button class="know"     onclick="know()">Ich wusste es</button>
  <button class="dontknow" onclick="dontKnow()">Nochmal</button>
</div>

<div class="buttons">
  <button class="switch" onclick="switchLang()">Sprache wechseln</button>
</div>

<div class="progress"></div>

<script>
const sheetURL =
  "https://opensheet.elk.sh/1-4SbLM2LfQDyAHG3OI_FkWA_u05-k3xbRxWobGRp-XI/Tabellenblatt1";

// IndexedDB kann `Infinity` nicht speichern – wir verwenden diese Zahl als Ersatz
const MASTERED_FLAG = 9999999999999;

let words = [];
let current = 0;
let flipped = false;
let showGerman = true;
let db;

// =====================
// IndexedDB SETUP
// =====================
function openDB() {
  return new Promise((resolve, reject) => {
    // Version auf 2 erhöht, damit alte (kaputte) Einträge nicht übernommen werden
    const request = indexedDB.open("flashcardsDB_v2", 1);

    request.onupgradeneeded = e => {
      db = e.target.result;
      db.createObjectStore("cards", { keyPath: "id" });
    };

    request.onsuccess = e => {
      db = e.target.result;
      resolve();
    };

    request.onerror = e => reject(e);
  });
}

function saveCard(card) {
  const cardToSave = {
    id: card.id,
    // Infinity durch MASTERED_FLAG ersetzen, damit IndexedDB es korrekt speichert
    nextReview: card.nextReview === Infinity ? MASTERED_FLAG : card.nextReview,
    repetitions: card.repetitions
  };
  const tx = db.transaction("cards", "readwrite");
  tx.objectStore("cards").put(cardToSave);
}

function loadAllCards() {
  return new Promise(resolve => {
    const tx = db.transaction("cards", "readonly");
    const store = tx.objectStore("cards");
    const request = store.getAll();

    request.onsuccess = () => {
      const data = {};
      request.result.forEach(c => {
        // MASTERED_FLAG wieder zu Infinity konvertieren
        c.nextReview = c.nextReview === MASTERED_FLAG ? Infinity : c.nextReview;
        data[c.id] = c;
      });
      resolve(data);
    };
  });
}

// =====================
// INIT
// =====================
fetch(sheetURL)
  .then(res => res.json())
  .then(async data => {
    await openDB();
    const saved = await loadAllCards();

    words = data.map((w, index) => ({
      id: index,
      German: w.German,
      Italian: w.Italian,
      nextReview:  saved[index]?.nextReview  ?? 0,
      repetitions: saved[index]?.repetitions ?? 0
    }));

    nextCard();
  })
  .catch(() => {
    document.querySelector(".card").innerText = "Fehler beim Laden";
  });

// =====================
// LOGIC
// =====================
function now()     { return Date.now(); }
function in7Days() { return now() + 7 * 24 * 60 * 60 * 1000; }

function getDueWords() {
  return words.filter(w => w.repetitions < 2 && w.nextReview <= now());
}

function showCard() {
  const due = getDueWords();

  if (due.length === 0) {
    document.querySelector(".card").innerText = "Heute fertig 🎉";
    document.querySelector(".progress").innerText = "";
    return;
  }

  const word = due[current];
  flipped = false;

  document.querySelector(".card").innerText =
    showGerman ? word.German : word.Italian;

  updateProgress(due.length);
}

function flipCard() {
  const due = getDueWords();
  if (due.length === 0) return;

  const word = due[current];
  flipped = !flipped;

  document.querySelector(".card").innerText = flipped
    ? (showGerman ? word.Italian : word.German)
    : (showGerman ? word.German  : word.Italian);
}

function know() {
  const due = getDueWords();
  if (due.length === 0) return;

  const word = due[current];
  word.repetitions++;
  word.nextReview = word.repetitions >= 2 ? Infinity : in7Days();

  saveCard(word);
  nextCard();
}

function dontKnow() {
  const due = getDueWords();
  if (due.length === 0) return;

  // Karte vollständig zurücksetzen, damit sie wirklich nochmal gelernt wird
  const word = due[current];
  word.repetitions = 0;
  word.nextReview   = 0;

  saveCard(word);
  nextCard();
}

function nextCard() {
  const due = getDueWords();

  if (due.length === 0) {
    showCard();
    return;
  }

  // Sicherstellen, dass nicht dieselbe Karte zweimal hintereinander kommt
  let next;
  do {
    next = Math.floor(Math.random() * due.length);
  } while (due.length > 1 && next === current);

  current = next;
  showCard();
}

function switchLang() {
  showGerman = !showGerman;
  showCard();
}

function updateProgress(dueCount) {
  const mastered = words.filter(w => w.repetitions >= 2).length;
  document.querySelector(".progress").innerText =
    dueCount + " Karten heute  ·  " + mastered + " / " + words.length + " gelernt";
}
</script>

</body>
</html>
