<script>
let words = [];
let current = 0;
let flipped = false;
let showGerman = true;

const sheetURL =
  "https://opensheet.elk.sh/1-4SbLM2LfQDyAHG3OI_FkWA_u05-k3xbRxWobGRp-XI/Tabellenblatt1";

const STORAGE_KEY = "flashcards_progress";

fetch(sheetURL)
  .then(res => res.json())
  .then(data => {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};

    words = data.map((w, index) => {
      return {
        id: index,
        German: w.German,
        Italian: w.Italian,
        nextReview: saved[index]?.nextReview || 0,
        repetitions: saved[index]?.repetitions || 0
      };
    });

    nextCard();
  });

function saveProgress() {
  const data = {};
  words.forEach(w => {
    data[w.id] = {
      nextReview: w.nextReview,
      repetitions: w.repetitions
    };
  });

  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function getNow() {
  return new Date().getTime();
}

function get7Days() {
  return getNow() + 7 * 24 * 60 * 60 * 1000;
}

function getDueWords() {
  return words.filter(w => w.repetitions < 2 && w.nextReview <= getNow());
}

function showCard() {
  const due = getDueWords();

  if (due.length === 0) {
    document.querySelector(".card").innerText = "Heute fertig 🎉";
    document.querySelector(".progress").innerText = "";
    return;
  }

  const word = due[current % due.length];

  flipped = false;

  document.querySelector(".card").innerText =
    showGerman ? word.German : word.Italian;

  updateProgress(due.length);
}

function flipCard() {
  const due = getDueWords();
  const word = due[current % due.length];

  flipped = !flipped;

  document.querySelector(".card").innerText = flipped
    ? (showGerman ? word.Italian : word.German)
    : (showGerman ? word.German : word.Italian);
}

function know() {
  const due = getDueWords();
  const word = due[current % due.length];

  word.repetitions++;

  if (word.repetitions >= 2) {
    // MASTERED → remove forever
    word.nextReview = Infinity;
  } else {
    // first success → review in 7 days
    word.nextReview = get7Days();
  }

  saveProgress();
  nextCard();
}

function dontKnow() {
  nextCard();
}

function nextCard() {
  const due = getDueWords();

  if (due.length === 0) {
    showCard();
    return;
  }

  current = Math.floor(Math.random() * due.length);
  showCard();
}

function switchLang() {
  showGerman = !showGerman;
  showCard();
}

function updateProgress(count) {
  document.querySelector(".progress").innerText =
    count + " Karten heute";
}
</script>
